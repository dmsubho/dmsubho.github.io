<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance | Stay Tuned</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6a00;
            --secondary: #ffffff;
            --bg-dark: #0a0a0a;
            --bg-gradient: #000000;
            --text-sub: #cccccc;
            --footer-text: #888888;
            --input-bg: #111111;
            --neon-shadow: 0 0 10px rgba(255, 106, 0, 0.5), 0 0 20px rgba(255, 106, 0, 0.3);
            --neon-shadow-intense: 0 0 15px rgba(255, 106, 0, 0.8), 0 0 30px rgba(255, 106, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--secondary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Animated Background Gradient */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--bg-dark) 0%, var(--bg-gradient) 100%);
            z-index: -2;
            animation: pulseBg 8s ease-in-out infinite;
        }

        @keyframes pulseBg {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Canvas Particles */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Main Container */
        .container {
            max-width: 800px;
            width: 90%;
            padding: 40px 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            margin-bottom: 10px;
        }
        .logo svg {
            width: 60px;
            height: 60px;
            fill: var(--primary);
            filter: drop-shadow(0 0 8px var(--primary));
        }

        /* Typography */
        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(32px, 8vw, 48px);
            font-weight: 700;
            color: var(--secondary);
            text-transform: capitalize;
            line-height: 1.2;
            text-shadow: var(--neon-shadow);
            animation: textGlow 3s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: var(--neon-shadow); }
            to { text-shadow: var(--neon-shadow-intense); }
        }

        .subtext {
            font-size: clamp(16px, 4vw, 18px);
            color: var(--text-sub);
            max-width: 600px;
            line-height: 1.6;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .count-box {
            background: transparent;
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            min-width: 80px;
            box-shadow: inset 0 0 5px var(--primary), 0 0 10px var(--primary);
        }

        .count-num {
            display: block;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            color: var(--primary);
        }

        .count-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
        }

        /* Subscription Form */
        .subscription-form {
            display: flex;
            width: 100%;
            max-width: 450px;
            gap: 10px;
        }

        .subscription-form input {
            flex: 1;
            padding: 14px 20px;
            background: var(--input-bg);
            border: 1px solid var(--primary);
            border-radius: 6px;
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        .subscription-form input:focus {
            box-shadow: 0 0 15px rgba(255, 106, 0, 0.4);
        }

        .subscription-form button {
            padding: 14px 28px;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .subscription-form button:hover {
            box-shadow: 0 0 20px var(--primary);
            transform: translateY(-2px);
        }

        /* Social Icons */
        .socials {
            display: flex;
            gap: 25px;
            margin-top: 20px;
        }

        .social-link {
            color: var(--secondary);
            transition: 0.3s ease;
            text-decoration: none;
        }

        .social-link svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .social-link:hover {
            color: var(--primary);
            filter: drop-shadow(0 0 8px var(--primary));
        }

        /* Footer */
        footer {
            margin-top: 20px;
            color: var(--footer-text);
            font-size: 14px;
        }

        /* Success Message Toast */
        #message-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid var(--primary);
            padding: 12px 24px;
            border-radius: 50px;
            display: none;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .countdown {
                gap: 8px;
            }
            .count-box {
                min-width: 65px;
                padding: 10px 5px;
            }
            .subscription-form {
                flex-direction: column;
            }
            .subscription-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>
    <canvas id="particles"></canvas>

    <div class="container">
        <!-- Logo Section -->
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2zM12 15.63l-4.5 2 4.5-11 4.5 11-4.5-2z"/>
            </svg>
        </div>

        <!-- Headline -->
        <h1>We’re Under Maintenance</h1>

        <!-- Subtext -->
        <p class="subtext">We’re making improvements to serve you better. Our team is working hard behind the scenes. We’ll be back shortly.</p>

        <!-- Countdown -->
        <div class="countdown" id="countdown">
            <div class="count-box">
                <span class="count-num" id="days">00</span>
                <span class="count-label">Days</span>
            </div>
            <div class="count-box">
                <span class="count-num" id="hours">00</span>
                <span class="count-label">Hours</span>
            </div>
            <div class="count-box">
                <span class="count-num" id="minutes">00</span>
                <span class="count-label">Mins</span>
            </div>
            <div class="count-box">
                <span class="count-num" id="seconds">00</span>
                <span class="count-label">Secs</span>
            </div>
        </div>

        <!-- Subscription -->
        <form class="subscription-form" id="notifyForm">
            <input type="email" id="emailInput" placeholder="Enter your email" required>
            <button type="submit">Notify Me</button>
        </form>

        <!-- Social Icons -->
        <div class="socials">
            <a href="#" class="social-link">
                <svg viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg>
            </a>
            <a href="#" class="social-link">
                <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a href="#" class="social-link">
                <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
        </div>

        <footer>
            © 2026 DMSubho. All rights reserved.
        </footer>
    </div>

    <div id="message-box">Thanks! We'll notify you.</div>

    <script>
        // --- Countdown Timer Logic ---
        function updateCountdown() {
            // Set end date to 2 days from now
            const now = new Date().getTime();
            const targetDate = localStorage.getItem('maintenanceTarget') || (now + 172800000); 
            if (!localStorage.getItem('maintenanceTarget')) localStorage.setItem('maintenanceTarget', targetDate);

            const distance = targetDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('minutes').innerText = String(m).padStart(2, '0');
            document.getElementById('seconds').innerText = String(s).padStart(2, '0');

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = "Back soon!";
            }
        }

        // --- Particle System ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 106, 0, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 10000); // Low density
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        // --- Form Interaction ---
        document.getElementById('notifyForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            if (email) {
                const box = document.getElementById('message-box');
                box.style.display = 'block';
                document.getElementById('emailInput').value = '';
                setTimeout(() => { box.style.display = 'none'; }, 3000);
            }
        });

        // Initialize everything
        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        window.onload = () => {
            resize();
            initParticles();
            animate();
            setInterval(updateCountdown, 1000);
            updateCountdown();
        };
    </script>
</body>
</html>
